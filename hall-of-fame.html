<style>
  /* ================= 高端扁平化核心变量 ================= */
  .shs-hof-namespace {
    --swell-brand: #bd3140; /* 更加深沉正式的树莓红 */
    --swell-accent: #b08d45; /* 雅致暗金 */
    --swell-bg: #ffffff;
    --swell-bg-gray: #fafafa;
    --swell-text-main: #1a1a1a;
    --swell-text-sub: #555555;
    --swell-text-light: #999999;
    --swell-border: #e2e2e2;
    --swell-border-light: #f0f0f0;
    
    font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    color: var(--swell-text-main);
    max-width: 100%;
    margin: 0 auto;
    line-height: 1.8;
  }
  .shs-hof-namespace * { box-sizing: border-box; }

  /* ================= 极简数据统计 ================= */
  .shs-hof-namespace .flat-stats-row {
    display: flex; gap: 40px; margin-bottom: 48px; justify-content: flex-start;
    padding: 24px 0; border-top: 1px solid var(--swell-border-light); border-bottom: 1px solid var(--swell-border-light);
    flex-wrap: wrap;
  }
  .shs-hof-namespace .flat-stat-item {
    display: flex; flex-direction: column; align-items: flex-start;
  }
  .shs-hof-namespace .stat-num {
    font-size: 36px; font-weight: 400; color: var(--swell-text-main);
    font-family: "Didot", "Georgia", serif; /* 引入衬线体增强高级感 */
    line-height: 1; margin-bottom: 8px;
  }
  .shs-hof-namespace .stat-text { 
    font-size: 13px; color: var(--swell-text-light); letter-spacing: 1px; text-transform: uppercase;
  }

  /* ================= 极简底线 Tab 导航 ================= */
  .shs-hof-namespace .flat-filter-wrap {
    margin-bottom: 32px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
    border-bottom: 1px solid var(--swell-border);
  }
  .shs-hof-namespace .flat-filter-wrap::-webkit-scrollbar { display: none; }
  .shs-hof-namespace .flat-filter-track { display: flex; gap: 32px; }
  
  .shs-hof-namespace .flat-tab {
    flex-shrink: 0; padding: 0 0 12px 0; background: transparent; border: none;
    border-bottom: 2px solid transparent; font-size: 15px; color: var(--swell-text-sub);
    cursor: pointer; transition: color 0.3s;
  }
  .shs-hof-namespace .flat-tab:hover { color: var(--swell-text-main); }
  .shs-hof-namespace .flat-tab.active {
    color: var(--swell-text-main); border-bottom-color: var(--swell-text-main); font-weight: 600;
  }
  
  /* ================= 扁平化杂志排版网格 ================= */
  .shs-hof-namespace .flat-gallery-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 32px 24px;
  }
  
  .shs-hof-namespace .flat-card {
    cursor: pointer; background: transparent;
  }
  .shs-hof-namespace .flat-card.hide { display: none; }
  
  .shs-hof-namespace .card-img-box {
    position: relative; aspect-ratio: 3 / 4; background: var(--swell-bg-gray);
    margin-bottom: 16px; overflow: hidden;
  }
  
  .shs-hof-namespace .card-img {
    width: 100%; height: 100%; object-fit: cover;
    transition: opacity 0.4s ease, transform 0.6s ease;
  }
  /* 克制的悬停：稍微变暗，轻微放大 */
  .shs-hof-namespace .flat-card:hover .card-img { 
    opacity: 0.85; transform: scale(1.02); 
  }

  /* 直角纯色标签，彰显学术正式感 */
  .shs-hof-namespace .card-badge {
    position: absolute; top: 0; left: 0;
    padding: 4px 10px; font-size: 11px; font-weight: 500; color: #fff;
    letter-spacing: 1px; z-index: 2;
  }

  .shs-hof-namespace .card-name { 
    font-size: 17px; font-weight: 600; color: var(--swell-text-main); 
    line-height: 1.3; margin-bottom: 4px;
  }
  .shs-hof-namespace .card-role { 
    font-size: 13px; color: var(--swell-text-light); font-weight: 400;
  }

  /* ================= 详情侧边栏 (扁平无阴影) ================= */
  .shs-hof-namespace .flat-overlay {
    position: fixed; inset: 0; background: rgba(255, 255, 255, 0.9); /* 白色半透，高级感 */

  }
  .shs-hof-namespace .flat-overlay.active { opacity: 1; visibility: visible; }
  
  .shs-hof-namespace .flat-drawer {
    position: fixed; top: 0; right: 0;
    width: 520px; max-width: 100vw; height: 100vh;
    background: var(--swell-bg); 
    border-left: 1px solid var(--swell-border); /* 纯细线分割，无阴影 */

    overflow-y: auto; display: flex; flex-direction: column;

  .shs-hof-namespace .flat-drawer.active { transform: translateX(0); }
  
  /* 极简关闭按钮 */
  .shs-hof-namespace .flat-close-btn {
    position: absolute; top: 20px; right: 24px;
    width: 32px; height: 32px; background: transparent; border: none;
    cursor: pointer; color: var(--swell-text-light); z-index: 10; 
    transition: color 0.3s, transform 0.3s;
    display: flex; align-items: center; justify-content: center;
  }
  .shs-hof-namespace .flat-close-btn:hover { color: var(--swell-text-main); transform: rotate(90deg); }

  .shs-hof-namespace .dp-cover { 
    width: 100%; height: 360px; object-fit: cover; 
    border-bottom: 1px solid var(--swell-border-light); 
  }
  
  .shs-hof-namespace .dp-content { padding: 40px 48px; }
  
  .shs-hof-namespace .dp-name { 
    font-size: 32px; font-weight: 500; margin: 0 0 8px; 
    color: var(--swell-text-main); line-height: 1.2; letter-spacing: 1px;
  }
  .shs-hof-namespace .dp-role { 
    font-size: 14px; color: var(--swell-text-sub); font-weight: 400; margin: 0 0 24px; 
    text-transform: uppercase; letter-spacing: 1px;
  }
  
  /* 扁平细线标签 */
  .shs-hof-namespace .dp-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 40px; }
  .shs-hof-namespace .dp-tag {
    font-size: 12px; padding: 4px 12px; background: transparent; 
    border: 1px solid var(--swell-border); color: var(--swell-text-sub);
  }
  
  /* Swell 原生标题风格：左侧极细主色线 + 底部浅灰线 */
  .shs-hof-namespace .dp-section-title {
    font-size: 18px; font-weight: 600; color: var(--swell-text-main);
    margin: 40px 0 20px; padding: 0 0 12px 0;
    border-bottom: 1px solid var(--swell-border-light);
    position: relative;
  }
  .shs-hof-namespace .dp-section-title::after {
    content: ''; position: absolute; bottom: -1px; left: 0;
    width: 40px; height: 2px; background: var(--swell-text-main);
  }
  
  .shs-hof-namespace .dp-contribution { 
    font-size: 15px; line-height: 1.85; color: var(--swell-text-sub); margin-bottom: 32px; 
    text-align: justify;
  }
  
  /* 杂志风引用块 */
  .shs-hof-namespace .dp-quote {
    padding: 24px; background: var(--swell-bg-gray); 
    border-left: 2px solid var(--swell-text-main); 
    font-size: 15px; color: var(--swell-text-main); 
    font-family: "Didot", "Georgia", serif; font-style: italic; margin-bottom: 32px;
  }
  
  .shs-hof-namespace #radar-chart {
    width: 100%; height: 320px; background: transparent;
    margin-bottom: 32px;
  }

  /* 扁平文字链接 */
  .shs-hof-namespace .dp-archive {
    display: inline-flex; align-items: center; gap: 8px; margin-top: 8px;
    font-size: 14px; color: var(--swell-brand); text-decoration: none; 
    border-bottom: 1px solid transparent; transition: border-color 0.3s;
  }
  .shs-hof-namespace .dp-archive:hover { border-bottom-color: var(--swell-brand); }

    .shs-hof-namespace .flat-stats-row { gap: 24px; padding: 16px 0; }
    .shs-hof-namespace .stat-num { font-size: 28px; }
    .shs-hof-namespace .flat-gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 24px 16px; }
    .shs-hof-namespace .dp-cover { height: 260px; }
    .shs-hof-namespace .dp-content { padding: 32px 24px; }
    .shs-hof-namespace .dp-name { font-size: 26px; }
  }

  @keyframes flatFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>

    const filterTrack = document.getElementById('termFilters');
    [1,2,3,4,5,6,7,8].forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'flat-tab';
      btn.onclick = () => filterTerm(t);
      btn.dataset.term = t;
      btn.innerHTML = `第${termNames[t-1]}届`;
      filterTrack.appendChild(btn);
    });

    function renderPhotoGrid() {
      const grid = document.getElementById('photoGrid');
      grid.innerHTML = '';
      people.forEach(p => {
        const card = document.createElement('div');
        card.className = 'flat-card';
        card.dataset.term = p.term;
        const photoUrl = getPhotoUrl(p.name, p.term, p.photo);
        
        // 彻底图文分离的扁平排版
        card.innerHTML = `
          <div class="card-img-box">
            <div class="card-badge" style="background: ${termColors[p.term]}">${p.term} 届</div>
            <img class="card-img" src="${photoUrl}" alt="${p.name}" loading="lazy">
          </div>
          <div class="card-info">
            <div class="card-name">${p.name}</div>
            <div class="card-role">${p.role}</div>
          </div>
        `;
        card.addEventListener('click', () => openDetail(p, photoUrl));
        grid.appendChild(card);
      });
    }
    renderPhotoGrid();

    let radarChart = null;

    window.openDetail = function(p, photoUrl) {
      const overlay = document.getElementById('detailOverlay');
      const panel = document.getElementById('detailPanel');
      const content = document.getElementById('detailPanelContent');
      
      let quoteHtml = p.quote ? `<div class="dp-quote">${p.quote}</div>` : '';
      let archiveHtml = p.archive ? `<div class="dp-section-title">相关文献</div><a href="#" class="dp-archive">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
        ${p.archive}</a>` : '';
      let radarHtml = p.scores ? `<div class="dp-section-title">核心素质雷达</div><div id="radar-chart"></div>` : '';

      content.innerHTML = `
        <img class="dp-cover" src="${photoUrl}" alt="${p.name}">
        <div class="dp-content">
          <h2 class="dp-name">${p.name}</h2>
          <p class="dp-role">${p.role}</p>
          <div class="dp-tags">
            ${p.tags.map(t => `<span class="dp-tag">${t}</span>`).join('')}
          </div>
          <div class="dp-section-title">主要履历及贡献</div>
          <div class="dp-contribution">${p.contribution}</div>
          ${quoteHtml}
          ${radarHtml}
          ${archiveHtml}
        </div>
      `;

      overlay.classList.add('active');
      panel.classList.add('active');
      document.body.style.overflow = 'hidden';
      
      if (radarHtml) setTimeout(() => renderRadar(p, termColors[p.term]), 350);
    };

    window.closeDetail = function() {
      document.getElementById('detailOverlay').classList.remove('active');
      document.getElementById('detailPanel').classList.remove('active');
      document.body.style.overflow = '';
      setTimeout(() => { if (radarChart) { radarChart.dispose(); radarChart = null; } }, 400);
    };

    function renderRadar(p, color) {
      const radarEl = document.getElementById('radar-chart');
      if (!radarEl || typeof echarts === 'undefined') return;
      radarChart = echarts.init(radarEl);
      radarChart.setOption({
        tooltip: { backgroundColor: '#fff', textStyle: { color: '#1a1a1a' }, borderColor: '#e2e2e2' },
        radar: {
          indicator:[ 
            { name: '规章制度', max: 5 }, { name: '艺术审美', max: 5 }, 
            { name: '对外联络', max: 5 }, { name: '硬件技术', max: 5 }, 
            { name: '人文温度', max: 5 }, { name: '团队管理', max: 5 }
          ],
          shape: 'polygon', radius: '65%', center:['50%', '50%'], splitNumber: 4,
          axisName: { color: '#555', fontSize: 11, fontWeight: 'normal' },
          splitArea: { areaStyle: { color: ['transparent'] } },
          axisLine: { lineStyle: { color: '#eee' } },
          splitLine: { lineStyle: { color: '#eee' } }
        },
        series:[{ 
          type: 'radar', 
          data:[{ 
            value: p.scores.map(v => v/20), name: p.name, 
            areaStyle: { color: color + '15' }, lineStyle: { color: color, width: 1.5 }, 
            itemStyle: { color: color }, symbol: 'circle', symbolSize: 4
          }] 
        }]
      });
    }

    window.filterTerm = function(term) {
      document.querySelectorAll('.flat-tab').forEach(btn => {
        btn.classList.toggle('active', (term === 0 && !btn.dataset.term) || parseInt(btn.dataset.term) === term);
      });
      document.querySelectorAll('.flat-card').forEach(card => {
        if (term === 0 || parseInt(card.dataset.term) === term) {
          card.classList.remove('hide');
          card.style.animation = 'none'; card.offsetHeight; 
          card.style.animation = 'flatFadeIn 0.3s ease forwards';
        } else {
          card.classList.add('hide');
        }
      });
    };

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });
    window.addEventListener('resize', () => { if (radarChart) radarChart.resize(); });
  });
</script>
