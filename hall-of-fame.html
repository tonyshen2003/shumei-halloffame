<script>
  document.addEventListener("DOMContentLoaded", function() {

    // 【DOM Teleport】: 移至 body 尾部，避开层级遮挡
    const modalsContainer = document.getElementById('shs-hof-modals');
    if (modalsContainer && modalsContainer.parentNode !== document.body) {
      document.body.appendChild(modalsContainer);
    }

    // 【手机端滑动返回】: 向右滑动关闭详情弹窗
    const drawer = document.getElementById('detailPanel');
    let touchStartX = 0;
    let touchStartY = 0;
    let touchMoveX = 0;
    let touchMoveY = 0;
    let isSwipeActive = false;
    let isVerticalScroll = false;
    let isHorizontalSwipe = false;

    if (drawer) {
      drawer.addEventListener('touchstart', (e) => {
        // 检查边界条件：抽屉未激活或不是从左侧边缘开始滑动则忽略
        if (!drawer.classList.contains('active')) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        if (touchStartX > 50) return; // 只有从左侧边缘 50px 内开始滑动才响应
        touchMoveX = touchStartX;
        touchMoveY = touchStartY;
        isSwipeActive = true;
        isVerticalScroll = false;
        isHorizontalSwipe = false;
      }, { passive: true });

      drawer.addEventListener('touchmove', (e) => {
        if (!isSwipeActive || isVerticalScroll) return;
        
        touchMoveX = e.touches[0].clientX;
        touchMoveY = e.touches[0].clientY;
        
        const diffX = touchMoveX - touchStartX;
        const diffY = touchMoveY - touchStartY;
        
        // 初始判断：移动一定距离后确定滑动方向
        if (!isHorizontalSwipe && !isVerticalScroll && (Math.abs(diffX) > 10 || Math.abs(diffY) > 10)) {
          // 判断滑动方向：如果 Y 轴移动大于等于 X 轴，判定为垂直滚动
          if (Math.abs(diffY) >= Math.abs(diffX)) {
            isVerticalScroll = true;
            return;
          } else {
            isHorizontalSwipe = true;
          }
        }
        
        // 如果已确定是垂直滚动，直接返回
        if (isVerticalScroll) return;
        
        // 只有确定是水平滑动时才阻止页面滚动并移动抽屉
        if (isHorizontalSwipe && diffX > 0) {
          e.preventDefault();
          drawer.style.transform = `translateX(${Math.min(diffX, 520)}px)`;
        }
      }, { passive: false });

      drawer.addEventListener('touchend', () => {
        if (!isSwipeActive) return;
        isSwipeActive = false;
        
        // 如果是垂直滚动，不做任何操作
        if (isVerticalScroll) {
          isVerticalScroll = false;
          isHorizontalSwipe = false;
          return;
        }
        
        const diff = touchMoveX - touchStartX;
        if (isHorizontalSwipe && diff > 100) {
          // 滑动超过 100px 且是水平滑动则关闭
          closeDetail();
        } else {
          // 否则回弹到原位
          drawer.style.transform = '';
        }
        
        isVerticalScroll = false;
        isHorizontalSwipe = false;
      });
    }

    // 采用更沉稳高级的色系
    const termColors = {
      1: '#942b38', 2: '#ab5e30', 3: '#9c8247', 4: '#42785d',
      5: '#445f8c', 6: '#664d85', 7: '#8a4c70', 8: '#388279'
    };
    const termNames =['一','二','三','四','五','六','七','八'];

    // 生成默认头像照片 URL：使用 DiceBear API，姓氏样式
    const getPhotoUrl = (name, term, customUrl) => {
      if (customUrl) return customUrl;
      const colorHex = termColors[term].replace('#', '');
      // 取姓氏（前 1-2 个汉字），加粗，居中显示
      const surname = name.length <= 2 ? name : name.substring(0, 2);
      return `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(surname)}&backgroundColor=${colorHex}&textColor=ffffff&fontWeight=bold&fontSize=70`;
    };

    // 等级到分数的映射
    const gradeToScore = { 'A': 5, 'B': 4, 'C': 3, 'D': 2, 'E': 1, '∞': 6, 'F': 1, '?': 2.5, '无': 0 };
    // 等级颜色映射
    const gradeColors = { 'A': '#bd3140', 'B': '#ab5e30', 'C': '#9c8247', 'D': '#42785d', 'E': '#445f8c', '∞': '#664d85', 'F': '#8a4c70', '?': '#777', '无': '#ccc' };
    
    const people =[
      // 第一届
      { id: 'mayuzhang',  name: '马雨璋', term: 1, role: '联合创始人·社长', tags:['创社核心','影视创作','传媒中心','《苏迷》'], contribution: '确立树莓社以影视创作为核心的社团定位，创立传媒中心。领导制作纪录片《苏迷》，带领社员参加48小时电影马拉松比赛。', quote: '当你的声音流淌，世界屏息静听；当你的镜头开启，天地重赋色彩。', grades:['C','A','B','B','F','∞'], archive: '《数媒社创社策划案》', photo: 'https://szzxshumei.com/wp-content/uploads/2026/04/00001029-248e-7e3a-4b97-e2988c633a1e.jpeg' },
      { id: 'shensunfeng',name: '沈孙丰', term: 1, role: '联合创始人·社长·组委会主席', tags:['组委会','民主改革','三项业务划分','文艺宣传'], contribution: '提出用"树莓"代替"数字媒体"，主导社团管理体制民主改革，起草《社团章程》。联合发起树莓派援助武汉抗疫募捐活动。', quote: '我们用行动回应了那些争议和误解，找到独属于我们的活动。', grades:['∞','B','A','B','A','A'], archive: '《苏州中学树莓社章程》', photo: 'https://szzxshumei.com/wp-content/uploads/2026/05/0000102b-f857-7536-4449-13721ebe114d.jpeg' },
      { id: 'zhangshihan', name: '张诗菡', term: 1, role: '联合创始人·副社长', tags:['视觉设计','树莓酱','树莓文化'], contribution: '创造了树莓社看板娘形象并主导早期视觉体系，为树莓社社团文化的发展奠定基础。', quote: '', grades:['B','B','B','C','A','C'], archive: '', photo: 'https://szzxshumei.com/wp-content/uploads/2026/05/0000102b-ed86-7585-4edd-04fdd1b09f0c-scaled.jpg' },

      // 第二届
      { id: 'shiyunhan',  name: '石允涵', term: 2, role: '第二任社长（双社长）', tags:['双社长制','照片直播'], contribution: '引入照片直播工作模式，开创摄影志愿服务品牌，大幅提高宣传时效性。荣获苏州市优秀社长称号。', quote: '面对挑战，我能行；遇到困难，我不怕；突发状况，我担当。', grades:['C','B','C','A','B','B'], archive: '《树莓社摄影志愿服务团队开展情况报告》', photo: 'https://szzxshumei.com/wp-content/uploads/2020/12/00000fce-cf5a-765c-4112-63519500030a.jpg' },
      { id: 'liuenqi',    name: '刘恩岐', term: 2, role: '第二任社长（双社长）', tags:['经费保障','后期部'], contribution: '树莓社历史双社长制代表。设计第二代工作证，为社团运营提供重要经费保障，起草《2019年社长工作报告》。', quote: '', grades:['C','C','C','B','B','C'], archive: '', photo: 'https://szzxshumei.com/wp-content/uploads/2026/05/0000102b-eb25-77f3-4ea7-dac5ef9ec980.jpeg' },
      { id: 'xingxiaohan',name: '邢笑菡', term: 2, role: '副社长 / 社盟副主席 / 代理社长', tags:['代理社长','部门优化'], contribution: '担任代理社长期间主持社团换届，提出部门结构优化方案。担任苏州中学社团联盟理事会副主席，促进跨社团交流。', quote: '', grades:['B','C','B','B','A','B'], archive: '', photo: 'https://szzxshumei.com/wp-content/uploads/2026/05/0000102b-fa00-7b4d-4b66-7c5af44ee508.png' },
      { id: 'yezhuo',     name: '叶卓',   term: 2, role: '代理社长 / 社盟主席', tags:['B站开创','社联主席'], contribution: '开创树莓社B站官方账号，探索社团传播新矩阵。当选社团联盟理事会主席，将"校级赋能"升级为常态发展引擎。', quote: '', grades:['B','A','B','B','C','B'], archive: '', photo: '' },

    window.filterTerm = function(term) {
      // 更新 URL hash
      if (term === 0) {
        history.replaceState(null, '', window.location.pathname + window.location.search);
      } else {
        history.replaceState(null, '', window.location.pathname + window.location.search + `#term${term}`);
      }
      
      document.querySelectorAll('.flat-tab').forEach(btn => {
        btn.classList.toggle('active', (term === 0 && !btn.dataset.term) || parseInt(btn.dataset.term) === term);
      });
      document.querySelectorAll('.flat-card').forEach(card => {
        if (term === 0 || parseInt(card.dataset.term) === term) {
          card.classList.remove('hide');
          card.style.animation = 'none'; card.offsetHeight; 
          card.style.animation = 'flatFadeIn 0.3s ease forwards';
        } else {
          card.classList.add('hide');
        }
      });
    };
    
    // 从 hash 读取并应用筛选
    function applyHashFilter() {
      const hash = window.location.hash;
      if (hash.startsWith('#term')) {
        const term = parseInt(hash.replace('#term', ''));
        if (term >= 1 && term <= 8) {
          filterTerm(term);
          return;
        }
      }
      // 默认显示全部
      filterTerm(0);
    }
    
    // 监听 hash 变化
    window.addEventListener('hashchange', applyHashFilter);

    const filterTrack = document.getElementById('termFilters');
    [1,2,3,4,5,6,7,8].forEach(t => {
      const btn = document.createElement('button');
      btn.className = 'flat-tab';
      btn.onclick = () => filterTerm(t);
      btn.dataset.term = t;
      btn.innerHTML = `第${termNames[t-1]}届`;
      filterTrack.appendChild(btn);
    });

    function renderPhotoGrid() {
      const grid = document.getElementById('photoGrid');
      grid.innerHTML = '';
      people.forEach(p => {
        const card = document.createElement('div');
        card.className = 'flat-card';
        card.dataset.term = p.term;
        const photoUrl = getPhotoUrl(p.name, p.term, p.photo);
        const bgColor = termColors[p.term];
        const fontSize = p.name.length <= 2 ? 18 : 14;
        
        // 彻底图文分离的扁平排版
        let imgContent = p.photo 
          ? `<img class="card-img" src="${photoUrl}" alt="${p.name}" loading="lazy">`
          : `<svg class="card-img" viewBox="0 0 100 56.25" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
              <rect width="100" height="56.25" fill="${bgColor}"/>
              <text x="50" y="36" text-anchor="middle" fill="white" font-size="${fontSize}" font-weight="bold" font-family="system-ui, sans-serif">${p.name}</text>
            </svg>`;
        
        card.innerHTML = `
          <div class="card-img-box">
            <div class="card-badge" style="background: ${bgColor}">${p.term} 届</div>
            ${imgContent}
          </div>
          <div class="card-info">
            <div class="card-name">${p.name}</div>
            <div class="card-role">${p.role}</div>
          </div>
        `;
        card.addEventListener('click', () => openDetail(p, photoUrl));
        grid.appendChild(card);
      });
    }
    renderPhotoGrid();

    // 页面加载时应用 hash 筛选
    applyHashFilter();

    let radarChart = null;

    window.openDetail = function(p, photoUrl) {
      const overlay = document.getElementById('detailOverlay');
      const panel = document.getElementById('detailPanel');
      const content = document.getElementById('detailPanelContent');
      
      let quoteHtml = p.quote ? `<div class="dp-quote">${p.quote}</div>` : '';
      let archiveHtml = p.archive ? `<div class="dp-section-title">相关文献</div><a href="#" class="dp-archive">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
        ${p.archive}</a>` : '';
      const bgColor = termColors[p.term];
      const fontSize = p.name.length <= 2 ? 22 : 18;
      let radarHtml = p.grades ? `<div class="dp-section-title">角色面板</div><div id="grade-labels"></div><div class="radar-container"><svg class="radar-outer-ring" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="none" stroke="${bgColor}" stroke-width="1.5"/></svg><div id="radar-chart"></div></div>` : '';
      
      let coverContent = p.photo 
        ? `<img class="dp-cover" src="${photoUrl}" alt="${p.name}">`
        : `<svg class="dp-cover" viewBox="0 0 100 69.23" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <rect width="100" height="69.23" fill="${bgColor}"/>
            <text x="50" y="42" text-anchor="middle" fill="white" font-size="${fontSize}" font-weight="bold" font-family="system-ui, sans-serif">${p.name}</text>
          </svg>`;

      content.innerHTML = `
        ${coverContent}
        <div class="dp-content">
          <h2 class="dp-name">${p.name}</h2>
          <p class="dp-role">${p.role}</p>
          <div class="dp-tags">
            ${p.tags.map(t => `<span class="dp-tag">${t}</span>`).join('')}
          </div>
          <div class="dp-section-title">角色背景故事</div>
          <div class="dp-contribution">${p.contribution}</div>
          ${quoteHtml}
          ${radarHtml}
          ${archiveHtml}
        </div>
      `;

      overlay.classList.add('active');
      panel.classList.add('active');
      document.body.style.overflow = 'hidden';
      
      if (radarHtml) setTimeout(() => renderRadar(p, termColors[p.term]), 350);
    };

    window.closeDetail = function() {
      const panel = document.getElementById('detailPanel');
      const overlay = document.getElementById('detailOverlay');
      panel.style.transform = ''; // 重置滑动造成的样式
      overlay.classList.remove('active');
      panel.classList.remove('active');
      document.body.style.overflow = '';
      setTimeout(() => { if (radarChart) { radarChart.dispose(); radarChart = null; } }, 400);
    };

    /**
     * 渲染雷达图函数
     * @param {Object} p - 成员对象，包含 grades 等信息
     * @param {String} color - 雷达图主题色（对应届别颜色）
     */
    function renderRadar(p, color) {
      const radarEl = document.getElementById('radar-chart'); // 雷达图容器元素
      const labelsEl = document.getElementById('grade-labels'); // 等级标签容器元素
      if (!radarEl || typeof echarts === 'undefined') return; // 如果没有容器或 echarts 未加载，直接返回
      
      // 雷达图的六个维度指标
      const indicators = ['组织', '创作', '文化', '影响', '责任', '创新'];
      // 渲染每个维度的等级标签（带对应颜色）
      labelsEl.innerHTML = indicators.map((ind, i) => {
        const grade = p.grades[i]; // 获取该维度的等级
        const gradeColor = gradeColors[grade] || '#777'; // 获取等级对应的颜色
        return `<span class="grade-label" style="background: ${gradeColor}20; border: 1px solid ${gradeColor}; color: ${gradeColor}">
          <strong>${ind}</strong>: ${grade}
        </span>`;
      }).join('');
      
      // 初始化 echarts 雷达图实例
      radarChart = echarts.init(radarEl);
      // 设置雷达图配置项
      radarChart.setOption({
        tooltip: { // 鼠标悬停时的提示框配置
          backgroundColor: '#fff', // 提示框背景色
          textStyle: { color: '#1a1a1a' }, // 提示框文字颜色
          borderColor: '#e2e2e2', // 提示框边框颜色
          formatter: (params) => { // 自定义提示框内容格式化函数
            const values = params.value;
            return `<strong>${params.name}</strong><br/>` + indicators.map((ind, i) => 
              `${ind}: ${p.grades[i]}`
            ).join('<br/>');
          }
        },
        radar: { // 雷达图坐标系配置
          indicator: indicators.map(name => ({ name, max: 6 })), // 维度名称和最大值（6 分制）
          shape: 'circle', // 雷达图形状：圆形
          radius: '65%', // 雷达图半径大小
          center:['50%', '50%'], // 雷达图中心点位置
          splitNumber: 6, // 分隔线数量（将雷达图分成 6 层）
          axisTick: { // 轴刻度配置
            show: true,
            splitNumber: 1,
            length: 2,
            lineStyle: {
              color: '#ccc',
              width: 2
            }
          },
          axisName: { 
            color: '#555', 
            fontSize: 11, 
            fontWeight: 'normal',
            lineHeight: 18,
            padding: [0, 0], // 标签内边距
            distance: 5, // 标签离轴线的距离（越小越近）
            // 根据维度位置动态调整顺序，让评级更靠近雷达图
            formatter: function(value) {
              const index = indicators.indexOf(value);
              const grade = p.grades[index];
              // 顶部和上半部分：维度名在上，评级在下
              // 底部和下半部分：评级在上，维度名在下
              if (index === 0 || index === 1 || index === 5) {
                return `${value}\n{grade|${grade}}`;
              } else {
                return `{grade|${grade}}\n${value}`;
              }
            },
            rich: {
              grade: {
                fontSize: 14,
                fontWeight: 'bold',
                color: '#1a1a1a',
                align: 'center'
              }
            }
          },
          splitArea: { areaStyle: { color: ['transparent'] } }, // 区域填充色（透明）
          axisLine: { lineStyle: { color: '#eee' } }, // 轴线颜色
          splitLine: { lineStyle: { color: ['#CCC', 'transparent', 'transparent', 'transparent', 'transparent', 'transparent'] } } // 分隔线颜色（从内到外，每层不同颜色）
        },
        series:[{ // 雷达图数据系列配置
          type: 'radar', // 图表类型：雷达图
          data:[{ 
            value: p.grades.map(g => gradeToScore[g] || 2.5), // 将等级转换为分数值
            name: p.name, // 数据系列名称（成员姓名）
            areaStyle: { color: color + '15' }, // 区域填充色（主题色 + 透明度 15%）
            lineStyle: { color: color, width: 1.5 }, // 线条样式（主题色，线宽 1.5）
            itemStyle: { color: color }, // 数据点样式（主题色）
            symbol: 'circle', // 数据点形状：圆形
            symbolSize: 2 // 数据点大小
          }] 
        }]
      });
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });
    window.addEventListener('resize', () => { if (radarChart) radarChart.resize(); });
  });
</script>
