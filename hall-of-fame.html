      const people = [
        { id: 'mayuzhang',  name: '马雨璋', term: 1, role: '第一任社长', tags: ['创社核心','传媒中心','《苏迷》'], contribution: '确立影视创作核心定位，按剧组划分部门；创立传媒中心，领导制作《苏迷》', scores: [5,2,4,5,3,2], archive: '《数媒社创社策划案》', photo: '' },
        { id: 'zhangshihan',name: '张诗菡', term: 1, role: '第一任副社长', tags: ['Logo设计','除夕拜年','视觉形象'], contribution: '设计社团Logo和传媒中心台标，担任传媒中心节目总策划，创造树莓视觉形象', scores: [3,3,2,5,4,1], photo: '' },
        { id: 'shensunfeng',name: '沈孙丰', term: 1, role: '组委会主席', tags: ['命名树莓','树莓派','社团联盟'], contribution: '提出用"树莓"代替"数字媒体"，起草章程，提出树莓派计划，发起援助武汉募捐', scores: [3,2,5,5,5,4], archive: '《苏州中学树莓社章程》', photo: '' },
        { id: 'shiyunhan',  name: '石允涵', term: 2, role: '第二届社长', tags: ['双社长制','照片直播','摄影志愿'], contribution: '引入照片直播工作模式，开创摄影志愿服务品牌，获苏州市优秀社长', scores: [4,3,4,4,3,3], photo: '' },
        { id: 'liuenqi',    name: '刘恩岐', term: 2, role: '第二届社长', tags: ['双社长制','经费保障'], contribution: '大力发扬树莓文化，设计第二代工作证，为社团运营提供重要经费保障', scores: [2,3,4,3,4,2], photo: '' },
        { id: 'zhuyi',      name: '朱奕',   term: 3, role: '第三届社长', tags: ['走出困境','识茶记'], contribution: '带领社团走出发展困境，明确社团发展方向，推动文化创新并完成《识茶记》', scores: [4,3,4,3,3,3], photo: '' },
        { id: 'pengjiayi',  name: '彭嘉仪', term: 3, role: '宣策部部长', tags: ['宣传改革','效益最大化'], contribution: '改革宣传方式，提出"将宣传效益最大化"理念', scores: [2,5,3,4,2,2], photo: '' },
        { id: 'luweiyi',    name: '陆未一', term: 4, role: '第四届副社长', tags: ['公众号创建','看板娘2.0'], contribution: '创建微信公众号并制定运营体系，设计第二代看板娘，改革宣传体系', scores: [2,5,3,5,4,2], photo: '' },
        { id: 'guhengting', name: '顾衡庭', term: 4, role: '第四届副社长', tags: ['视频直播','转播业务'], contribution: '开创树莓转播业务，完善B站运作机制，策划《苏迷》第一集', scores: [5,2,3,4,3,2], photo: '' },
        { id: 'wangyiyang', name: '汪翊扬', term: 4, role: '第四届社长', tags: ['创纪录招新','网课坚持'], contribution: '克服疫情障碍坚持线上活动，创纪录招新70余人达历史之最，获评优秀社团', scores: [3,3,4,3,3,3], photo: '' },
        { id: 'wangzhexi',  name: '王哲熙', term: 4, role: '编导部部长', tags: ['温度口号','内容创作'], contribution: '提出"用有温度有力量的作品，影响一群人，温暖一座城"', scores: [4,2,2,3,5,2], photo: '' },
        { id: 'liqian',     name: '李谦',   term: 5, role: '第五届社长', tags: ['线下回归','拍摄担当'], contribution: '将发展重心转移回线下，承担大量拍摄任务，韬光养晦厚积薄发', scores: [2,2,3,2,3,1], photo: '' },
        { id: 'zhouyijia',  name: '周熠嘉', term: 6, role: '第六届社长', tags: ['社团联盟','数字化转型'], contribution: '数字媒体学生社团联盟主要创始人，开启社团数字化治理转型，推动联盟签约', scores: [3,4,5,4,5,5], photo: '' },
        { id: 'wangyanran', name: '王嫣然', term: 6, role: '第六/七届副社长',tags: ['画纸采访','过渡保障'], contribution: '策划"画纸采访"，开创QQ账号，代行社长职权为过渡期提供稳定保障', scores: [3,4,4,4,4,3], photo: '' },
        { id: 'yangziyan',  name: '杨梓言', term: 7, role: '第七任社长', tags: ['全媒体矩阵','组织进化'], contribution: '建成全媒体传播矩阵，推动治理深层变革，提出"组织进化的伟大完成"', scores: [3,5,5,5,5,4], photo: '' },
        { id: 'zhujingxuan',name: '朱璟煊', term: 7, role: '策划与宣传部', tags: ['IP迭代','文创小组'], contribution: '"树莓酱"IP系统性迭代，周边产品深度开发', scores: [2,4,3,5,4,2], photo: '' },
        { id: 'chenyuxin',  name: '陈雨馨', term: 8, role: '第八任社长', tags: ['寻找主演','优秀社员'], contribution: '现任社长，微电影《寻找》主演，第八届社团掌舵人，延续影像薪火', scores: [4,3,4,3,4,3], photo: '' }
      ];

      const links = [
        { source: 'mayuzhang', target: 'shiyunhan', type: 'inherit' },
        { source: 'mayuzhang', target: 'liuenqi', type: 'inherit' },
        { source: 'shiyunhan', target: 'zhuyi', type: 'inherit' },
        { source: 'zhuyi', target: 'wangyiyang', type: 'inherit' },
        { source: 'wangyiyang', target: 'liqian', type: 'inherit' },
        { source: 'liqian', target: 'zhouyijia', type: 'inherit' },
        { source: 'zhouyijia', target: 'wangyanran', type: 'inherit' },
        { source: 'wangyanran', target: 'yangziyan', type: 'inherit' },
        { source: 'yangziyan', target: 'chenyuxin', type: 'inherit' }, // 新增传承
        { source: 'mayuzhang', target: 'zhangshihan', type: 'collab' },
        { source: 'mayuzhang', target: 'shensunfeng', type: 'collab' },
        { source: 'zhangshihan', target: 'shensunfeng', type: 'collab' },
        { source: 'shiyunhan', target: 'liuenqi', type: 'collab' },
        { source: 'zhuyi', target: 'pengjiayi', type: 'collab' },
        { source: 'luweiyi', target: 'guhengting', type: 'collab' },
        { source: 'wangyiyang', target: 'wangzhexi', type: 'collab' },
        { source: 'liqian', target: 'zhouyijia', type: 'collab' },
        { source: 'yangziyan', target: 'zhujingxuan', type: 'collab' },
        { source: 'shensunfeng', target: 'zhouyijia', type: 'influence' },
        { source: 'luweiyi', target: 'yangziyan', type: 'influence' },
      ];

      // D3 图表初始化
      const svgEl = document.getElementById('graph-svg');
      if (!svgEl) return;
      const containerRect = document.querySelector('.graph-container').getBoundingClientRect();
      const width = containerRect.width;
      const height = window.innerWidth < 640 ? 450 : (window.innerWidth < 1024 ? 550 : 650);
      svgEl.setAttribute('viewBox', `0 0 ${width} ${height}`);

      const g = d3.select(svgEl).append('g');
      const zoom = d3.zoom().scaleExtent([0.4, 2.5]).on('zoom', (event) => g.attr('transform', event.transform));
      d3.select(svgEl).call(zoom);

      // 布局分组
      const termGroups = {};
      people.forEach(p => { if (!termGroups[p.term]) termGroups[p.term] = []; termGroups[p.term].push(p); });

      const nodeMap = {};
      people.forEach(p => {
        const angle = (p.term - 1) * (2 * Math.PI / 8) - Math.PI / 2;
        const group = termGroups[p.term];
        const idx = group.indexOf(p);
        const offset = (idx - (group.length - 1) / 2) * 36;
        const rx = width * 0.35;
        const ry = height * 0.35;
        nodeMap[p.id] = {
          ...p,
          x: width / 2 + Math.cos(angle) * rx + Math.cos(angle + Math.PI/2) * offset,
          y: height / 2 + Math.sin(angle) * ry + Math.sin(angle + Math.PI/2) * offset,
          radius: p.role.includes('社长') || p.role.includes('主席') ? 16 : 11
        };
      });

      const nodes = Object.values(nodeMap);
      const simLinks = links.map(l => ({ ...l }));

      const linkElements = g.selectAll('.link').data(simLinks).enter().append('line').attr('class', d => `link-${d.type}`);
      const nodeGroups = g.selectAll('.node-group').data(nodes).enter().append('g').attr('class', 'node-group')
        .call(d3.drag().on('start', dragStart).on('drag', dragging).on('end', dragEnd));

      nodeGroups.append('circle').attr('r', d => d.radius + 1).attr('fill', 'none').attr('stroke', 'rgba(0,0,0,0.06)').attr('stroke-width', 1);
      nodeGroups.append('circle').attr('class', 'node-circle').attr('r', d => d.radius).attr('fill', d => termColors[d.term]).attr('fill-opacity', 0.9).attr('stroke', '#fff').attr('stroke-width', 2);
      nodeGroups.append('text').attr('class', 'node-label').attr('dy', d => d.radius + 15).text(d => d.name);
      nodeGroups.append('text').attr('class', 'node-role').attr('dy', d => d.radius + 26).text(d => { const m = d.role.match(/第[一二三四五六七八]+任|届/); return m ? d.role.substring(0, 4) : ''; });

      const termLabelData = Object.entries(termGroups).map(([term]) => {
        const angle = (parseInt(term) - 1) * (2 * Math.PI / 8) - Math.PI / 2;
        const dist = Math.min(width, height) * 0.42;
        return { x: width / 2 + Math.cos(angle) * dist, y: height / 2 + Math.sin(angle) * dist, label: `第${['一','二','三','四','五','六','七','八'][parseInt(term)-1]}届` };
      });
      g.selectAll('.term-group-label').data(termLabelData).enter().append('text').attr('class', 'term-group-label').attr('x', d => d.x).attr('y', d => d.y).text(d => d.label);

      function tick() {
        linkElements.attr('x1', d => nodeMap[d.source].x).attr('y1', d => nodeMap[d.source].y).attr('x2', d => nodeMap[d.target].x).attr('y2', d => nodeMap[d.target].y);
        nodeGroups.attr('transform', d => `translate(${d.x},${d.y})`);
      }

      // 性能优化: 冷却机制
      let alpha = 1;
      let animFrame;
      function simulate() {
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const dx = nodes[j].x - nodes[i].x, dy = nodes[j].y - nodes[i].y, dist = Math.sqrt(dx * dx + dy * dy) || 1, minDist = nodes[i].radius + nodes[j].radius + 44;
            if (dist < minDist) { const force = (minDist - dist) * 0.015 * alpha, fx = (dx / dist) * force, fy = (dy / dist) * force; nodes[i].x -= fx; nodes[i].y -= fy; nodes[j].x += fx; nodes[j].y += fy; }
          }
        }
        simLinks.forEach(link => {
          const s = nodeMap[link.source], t = nodeMap[link.target], dx = t.x - s.x, dy = t.y - s.y, dist = Math.sqrt(dx * dx + dy * dy) || 1;
          const ideal = link.type === 'inherit' ? 140 : 90;
          const force = (dist - ideal) * 0.002 * alpha;
          s.x += (dx / dist) * force; s.y += (dy / dist) * force; t.x -= (dx / dist) * force; t.y -= (dy / dist) * force;
        });
        nodes.forEach(n => {
          n.x += (width / 2 - n.x) * 0.0008 * alpha; n.y += (height / 2 - n.y) * 0.0008 * alpha;
          n.x = Math.max(n.radius + 10, Math.min(width - n.radius - 10, n.x)); n.y = Math.max(n.radius + 10, Math.min(height - n.radius - 10, n.y));
        });
        alpha *= 0.99; tick();
        if (alpha > 0.02) animFrame = requestAnimationFrame(simulate);
      }
      simulate();

      function dragStart(event, d) { alpha = Math.max(alpha, 0.3); d3.select(this).raise(); if(!animFrame) simulate(); }
      function dragging(event, d) { d.x = event.x; d.y = event.y; tick(); }
      function dragEnd() {}

      let radarChart = null;
      nodeGroups.on('click', (event, d) => {
        event.stopPropagation();
        nodeGroups.classed('selected', false);
        d3.select(event.currentTarget).classed('selected', true);
        openDetail(d);
      });
      d3.select(svgEl).on('click', () => { nodeGroups.classed('selected', false); closeDetail(); });

      // 打开详情面板
      function openDetail(p) {
        const overlay = document.getElementById('detailOverlay');
        const panel = document.getElementById('detailPanel');
        const content = document.getElementById('detailPanelContent');

        // 渲染人物照片
        const photoHtml = p.photo 
          ? `<div class="person-photo"><img src="${p.photo}" alt="${p.name}"></div>`
          : `<div class="person-photo">📷</div>`;

        // 渲染档案链接
        let archiveHtml = p.archive 
          ? `<div class="detail-section"><div class="detail-section-label">数字档案馆关联</div><div class="archive-links"><a href="#" class="archive-link">📄 ${p.archive}</a></div></div>`
          : '';

        content.innerHTML = `
          <div class="person-photo-section">${photoHtml}</div>
          <div class="person-header">
            <h2>${p.name}</h2>
            <div class="person-meta">
              <span class="person-tag">${p.role}</span>
              ${p.tags.map(t => `<span class="person-tag secondary">${t}</span>`).join('')}
            </div>
          </div>
          <div class="detail-section">
            <div class="detail-section-label">主要贡献</div>
            <div class="person-contribution">${p.contribution}</div>
          </div>
          <div class="detail-section">
            <div class="detail-section-label">能力画像</div>
            <div id="radar-chart"></div>
          </div>
          ${archiveHtml}
        `;

        // 显示面板
        overlay.classList.add('active');
        panel.classList.add('active');
        document.body.style.overflow = 'hidden';

        // 渲染雷达图
        setTimeout(() => renderRadar(p), 100);
      }

      // 关闭详情面板
      window.closeDetail = function() {
        const overlay = document.getElementById('detailOverlay');
        const panel = document.getElementById('detailPanel');
        const content = document.getElementById('detailPanelContent');

        overlay.classList.remove('active');
        panel.classList.remove('active');
        document.body.style.overflow = '';

        // 恢复空状态
        setTimeout(() => {
          content.innerHTML = `
            <div class="detail-empty-state">
              <div class="mascot-icon">🍓</div>
              <div>我是树莓酱！<br>点击图中的圆点，让我为您介绍历届领袖吧～</div>
            </div>
          `;
          if (radarChart) { radarChart.dispose(); radarChart = null; }
        }, 400);
      };

      function renderRadar(p) {
        if (radarChart) radarChart.dispose();
        const radarEl = document.getElementById('radar-chart');
        if (!radarEl) return;
        radarChart = echarts.init(radarEl);
        const color = termColors[p.term];
        radarChart.setOption({
          tooltip: { trigger: 'item' },
          radar: {
            indicator: [ { name: '影视创作', max: 5 }, { name: '宣传运营', max: 5 }, { name: '组织管理', max: 5 }, { name: '创新突破', max: 5 }, { name: '文化传承', max: 5 }, { name: '对外影响', max: 5 } ],
            shape: 'polygon', radius: '60%',
            axisName: { color: '#98a2b3', fontSize: 11, fontFamily: '-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Noto Sans SC' }
          },
          series: [{ type: 'radar', data: [{ value: p.scores, name: p.name, areaStyle: { color: color + '30' }, lineStyle: { color: color, width: 2.5 }, itemStyle: { color: color } }] }]
        });
      }

      window.filterTerm = function(term) {
        document.querySelectorAll('.timeline-item').forEach(n => n.classList.remove('active'));
        document.querySelector('.timeline-all').classList.remove('active');
        if (term === 0) { document.querySelector('.timeline-all').classList.add('active'); } 
        else { const el = document.querySelector(`.timeline-item[data-term="${term}"]`); if (el) el.classList.add('active'); }
        nodeGroups.classed('dimmed', d => term !== 0 && d.term !== term);
        linkElements.classed('dimmed', d => { if (term === 0) return false; const s = nodeMap[d.source], t = nodeMap[d.target]; return s.term !== term && t.term !== term; });
        g.selectAll('.term-group-label').attr('opacity', d => term === 0 ? 0.7 : 0.05);
      };

      window.addEventListener('resize', () => { if (radarChart) radarChart.resize(); });

      // ESC键关闭面板
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          closeDetail();
          nodeGroups.classed('selected', false);
        }
      });
    });
  </script>
</div>
