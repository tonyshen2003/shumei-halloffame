<div id="shs-hof-app">
  <!-- 引入必要的图表库 (建议在Swell主题中设置为按需或延迟加载) -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>



  <!-- 页面主体 -->
  <div class="hof-body">
    <!-- 图表区 -->
    <div class="graph-section">
      <!-- 数据统计面板 -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-number">8</div>
          <div class="stat-label">届组委会</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">22</div>
          <div class="stat-label">核心成员</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">2018</div>
          <div class="stat-label">创社至今</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">12</div>
          <div class="stat-label">历任社长</div>
        </div>
      </div>

      <!-- 力导向图容器 -->
      <div class="graph-container">
        <svg id="graph-svg">
          <defs>
            <marker id="arrow-inherit" viewBox="0 0 10 10" refX="10" refY="5"
                    markerWidth="5" markerHeight="5" orient="auto-start-reverse">
              <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="rgba(232,80,91,0.3)"/>
            </marker>
          </defs>
        </svg>
      </div>

      <!-- 图例 -->
      <div class="legend-widget">
        <div class="widget-title">图例说明</div>
        <div class="legend-list">
          <div class="legend-item"><div class="legend-dot" style="background:#e8505b"></div>社长 / 组委会主席</div>
          <div class="legend-item"><div class="legend-dot" style="background:#999"></div>部长 / 核心成员</div>
          <div class="legend-divider"></div>
          <div class="legend-item"><div class="legend-line solid"></div>传承关系</div>
          <div class="legend-item"><div class="legend-line dashed"></div>同届合作</div>
          <div class="legend-item"><div class="legend-line gold"></div>跨届影响</div>
        </div>
      </div>
    </div>

    <!-- 届别筛选侧边栏 -->
    <aside class="sidebar">
      <div class="widget">
        <div class="widget-title">届别筛选</div>
        <div class="timeline-list">
          <button class="timeline-all active" onclick="filterTerm(0)">全部届别</button>
          <div class="timeline-item" data-term="1" onclick="filterTerm(1)">
            <div class="timeline-dot" style="background:#e8505b"></div>
            <span class="timeline-year">2018</span>
            <span class="timeline-term-label">第一届</span>
          </div>
          <div class="timeline-item" data-term="2" onclick="filterTerm(2)">
            <div class="timeline-dot" style="background:#e88a3a"></div>
            <span class="timeline-year">2019</span>
            <span class="timeline-term-label">第二届</span>
          </div>
          <div class="timeline-item" data-term="3" onclick="filterTerm(3)">
            <div class="timeline-dot" style="background:#d4a853"></div>
            <span class="timeline-year">2020</span>
            <span class="timeline-term-label">第三届</span>
          </div>
          <div class="timeline-item" data-term="4" onclick="filterTerm(4)">
            <div class="timeline-dot" style="background:#5ab85a"></div>
            <span class="timeline-year">2021</span>
            <span class="timeline-term-label">第四届</span>
          </div>
          <div class="timeline-item" data-term="5" onclick="filterTerm(5)">
            <div class="timeline-dot" style="background:#4a9ee8"></div>
            <span class="timeline-year">2022</span>
            <span class="timeline-term-label">第五届</span>
          </div>
          <div class="timeline-item" data-term="6" onclick="filterTerm(6)">
            <div class="timeline-dot" style="background:#6878d0"></div>
            <span class="timeline-year">2023</span>
            <span class="timeline-term-label">第六届</span>
          </div>
          <div class="timeline-item" data-term="7" onclick="filterTerm(7)">
            <div class="timeline-dot" style="background:#9868c8"></div>
            <span class="timeline-year">2024</span>
            <span class="timeline-term-label">第七届</span>
          </div>
          <div class="timeline-item" data-term="8" onclick="filterTerm(8)">
            <div class="timeline-dot" style="background:#d86898"></div>
            <span class="timeline-year">2025</span>
            <span class="timeline-term-label">第八届</span>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <!-- 右侧滑出详情面板 -->
  <div class="detail-panel-overlay" id="detailOverlay" onclick="closeDetail()"></div>
  <div class="detail-panel" id="detailPanel">
    <button class="detail-close-btn" onclick="closeDetail()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <div class="detail-panel-content" id="detailPanelContent">
      <div class="detail-empty-state">
        <div class="mascot-icon">🍓</div>
        <div>我是树莓酱！<br>点击图中的圆点，让我为您介绍历届领袖吧～</div>
      </div>
    </div>
  </div>

  <style>
    /* ================= 命名空间隔离样式 - 浅色主题金色风格 ================= */
    #shs-hof-app {
      --hof-bg: #ffffff;
      --hof-bg-secondary: #fafafa;
      --hof-bg-card: #ffffff;
      --hof-bg-hover: #f5f5f5;
      --hof-text-primary: #1a1a24;
      --hof-text-secondary: #3a3a4a;
      --hof-text-muted: #88889a;
      --hof-accent: #c4a35a;
      --hof-accent2: #b8964a;
      --hof-accent-dim: rgba(196, 163, 90, 0.15);
      --hof-accent-soft: rgba(196, 163, 90, 0.10);
      --hof-border: #e0e0ea;
      --hof-shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.08);
      --hof-shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.06), 0 2px 4px -1px rgba(0, 0, 0, 0.04);
      --hof-shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.06);
      --hof-shadow-xl: 0 8px 32px rgba(0, 0, 0, 0.1);
      --hof-radius: 14px;
      --hof-radius-sm: 10px;
      --hof-radius-md: 10px;
      --hof-red: #e0556a;
      --hof-blue: #5a8ec4;
      --hof-green: #5ac48e;
      --hof-purple: #9a6ac4;
      --hof-orange: #e0884a;
      --hof-teal: #4ac4b8;
      --hof-pink: #d47ac4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: var(--hof-text-primary);
      line-height: 1.85;
      font-size: 16px;
      padding: 24px 0;
      max-width: 1280px;
      margin: 0 auto;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--hof-bg);
    }

    #shs-hof-app * { box-sizing: border-box; }

    /* 页面头部 */
    #shs-hof-app .hof-header {
      text-align: center;
      margin-bottom: 40px;
      padding-bottom: 32px;
      position: relative;
    }
    #shs-hof-app .hof-header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 2px;
      background: var(--hof-accent);
      border-radius: 2px;
    }
    #shs-hof-app .hof-header h1 {
      font-size: clamp(30px, 5vw, 44px);
      font-weight: 700;
      color: var(--hof-text-primary);
      letter-spacing: 4px;
      margin: 16px 0 8px;
      border: none;
      padding: 0;
      line-height: 1.3;
    }
    #shs-hof-app .en-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--hof-accent);
      letter-spacing: 6px;
      text-transform: uppercase;
    }
    #shs-hof-app .desc {
      font-size: 15px;
      color: var(--hof-text-muted);
      font-weight: 400;
      max-width: 620px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* 页面主体 */
    #shs-hof-app .hof-body {
      display: flex;
      gap: 28px;
      align-items: flex-start;
    }

    /* 图表区 */
    #shs-hof-app .graph-section {
      flex: 1;
      min-width: 0;
    }
    #shs-hof-app .graph-container {
      background: var(--hof-bg-card);
      border: 1px solid var(--hof-border);
      border-radius: var(--hof-radius);
      box-shadow: var(--hof-shadow-xl);
      overflow: hidden;
      position: relative;
    }
    #shs-hof-app .graph-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 30%, rgba(196, 163, 90, 0.12) 0%, transparent 50%),
                  radial-gradient(ellipse at 20% 80%, rgba(90, 142, 196, 0.08) 0%, transparent 40%),
                  radial-gradient(ellipse at 80% 70%, rgba(154, 106, 196, 0.06) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }
    #shs-hof-app #graph-svg {
      width: 100%;
      height: 650px;
      display: block;
      background: linear-gradient(135deg, rgba(196, 163, 90, 0.03) 0%, rgba(90, 142, 196, 0.02) 100%);
      cursor: grab;
      position: relative;
      z-index: 1;
    }
    #shs-hof-app #graph-svg:active { cursor: grabbing; }

    /* SVG 图表样式 */
    #shs-hof-app .link-inherit { stroke: rgba(196, 163, 90, 0.35); stroke-width: 2; fill: none; marker-end: url(#arrow-inherit); }
    #shs-hof-app .link-collab { stroke: rgba(255, 255, 255, 0.08); stroke-width: 1.5; stroke-dasharray: 4 4; fill: none; }
    #shs-hof-app .link-influence { stroke: rgba(196, 163, 90, 0.2); stroke-width: 1.5; stroke-dasharray: 3 6; fill: none; }
    #shs-hof-app .node-group { cursor: pointer; }
    #shs-hof-app .node-circle { transition: filter 0.3s, stroke-width 0.3s, r 0.2s; }
    #shs-hof-app .node-group:hover .node-circle { 
      filter: drop-shadow(0 4px 12px rgba(196, 163, 90, 0.4));
    }
    #shs-hof-app .node-group.selected .node-circle { 
      stroke: var(--hof-accent) !important; 
      stroke-width: 3; 
      filter: drop-shadow(0 4px 16px rgba(196, 163, 90, 0.5));
    }
    #shs-hof-app .node-label { font-size: 12px; fill: var(--hof-text-secondary); text-anchor: middle; pointer-events: none; font-weight: 500; }
    #shs-hof-app .node-group:hover .node-label, #shs-hof-app .node-group.selected .node-label { fill: var(--hof-text-primary); font-weight: 600; }
    #shs-hof-app .node-role { font-size: 10px; fill: var(--hof-text-muted); text-anchor: middle; pointer-events: none; }
    #shs-hof-app .term-group-label { font-size: 13px; fill: var(--hof-text-muted); text-anchor: middle; font-weight: 600; letter-spacing: 1px; opacity: 0.6; pointer-events: none; }

    /* 侧边栏与小组件 */
    #shs-hof-app .sidebar { width: 300px; flex-shrink: 0; }
    #shs-hof-app .widget {
      background: var(--hof-bg-card);
      border: 1px solid var(--hof-border);
      border-radius: var(--hof-radius);
      box-shadow: var(--hof-shadow-md);
      padding: 24px;
      margin-bottom: 20px;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    #shs-hof-app .widget:hover {
      border-color: rgba(196, 163, 90, 0.3);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }
    #shs-hof-app .widget-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--hof-text-primary);
      letter-spacing: 2px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--hof-border);
      position: relative;
    }
    #shs-hof-app .widget-title::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 50px;
      height: 2px;
      background: var(--hof-accent);
    }
    #shs-hof-app .timeline-list { display: flex; flex-direction: column; gap: 4px; }
    #shs-hof-app .timeline-item, #shs-hof-app .timeline-all {
      display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: var(--hof-radius-sm); cursor: pointer; transition: all 0.2s ease;
      border: none; background: transparent; width: 100%; font-family: inherit; font-size: 14px; color: var(--hof-text-secondary); font-weight: 500; text-align: left;
    }
    #shs-hof-app .timeline-item:hover, #shs-hof-app .timeline-all:hover { 
      background: var(--hof-accent-soft); 
      transform: translateX(4px); 
      color: var(--hof-accent2);
    }
    #shs-hof-app .timeline-item.active, #shs-hof-app .timeline-all.active { 
      background: var(--hof-accent-soft); 
      color: var(--hof-accent2); 
      font-weight: 600; 
    }
    #shs-hof-app .timeline-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; border: 2px solid var(--hof-border); transition: all 0.2s; }
    #shs-hof-app .timeline-item.active .timeline-dot { border-color: var(--hof-accent); background: var(--hof-accent) !important; }
    #shs-hof-app .timeline-year { min-width: 40px; font-weight: 600; }
    #shs-hof-app .timeline-term-label { font-size: 13px; color: var(--hof-text-muted); font-weight: 400; }
    
    /* 统计卡片 */
    #shs-hof-app .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
    #shs-hof-app .stat-card { 
      background: var(--hof-bg-card); 
      border: 1px solid var(--hof-border); 
      border-radius: var(--hof-radius); 
      padding: 20px 16px; 
      text-align: center;
      box-shadow: var(--hof-shadow-md);
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      position: relative;
      overflow: hidden;
    }
    #shs-hof-app .stat-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(196, 163, 90, 0.03) 0%, transparent 50%);
      pointer-events: none;
    }
    #shs-hof-app .stat-card:hover { 
      transform: translateY(-4px); 
      box-shadow: var(--hof-shadow-xl); 
      border-color: rgba(196, 163, 90, 0.35);
    }
    #shs-hof-app .stat-number { 
      font-size: 32px; font-weight: 700; 
      color: var(--hof-accent); line-height: 1;
      background: linear-gradient(135deg, var(--hof-accent) 0%, var(--hof-accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-feature-settings: "tnum";
    }
    #shs-hof-app .stat-label { font-size: 11px; color: var(--hof-text-muted); margin-top: 8px; letter-spacing: 1px; font-weight: 500; text-transform: uppercase; }

    /* 图例组件 */
    #shs-hof-app .legend-widget {
      margin-top: 20px;
      background: var(--hof-bg-card);
      border: 1px solid var(--hof-border);
      border-radius: var(--hof-radius);
      box-shadow: var(--hof-shadow-md);
      padding: 22px 24px;
      transition: box-shadow 0.3s, border-color 0.3s;
    }
    #shs-hof-app .legend-widget:hover {
      border-color: rgba(196, 163, 90, 0.2);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
    }
    #shs-hof-app .legend-list { display: flex; flex-direction: row; flex-wrap: wrap; gap: 16px 24px; }
    #shs-hof-app .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--hof-text-secondary); }
    #shs-hof-app .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.2); }
    #shs-hof-app .legend-divider { width: 1px; height: 20px; background: var(--hof-border); }
    #shs-hof-app .legend-line { width: 20px; height: 0; flex-shrink: 0; }
    #shs-hof-app .legend-line.solid { border-top: 2px solid rgba(196,163,90,0.6); }
    #shs-hof-app .legend-line.dashed { border-top: 1.5px dashed rgba(0,0,0,0.2); }
    #shs-hof-app .legend-line.gold { border-top: 1.5px dashed rgba(196,163,90,0.5); }

    /* 黯淡状态 */
    #shs-hof-app .node-group.dimmed .node-circle, #shs-hof-app .node-group.dimmed .node-label, #shs-hof-app .node-group.dimmed .node-role { opacity: 0.15; }
    #shs-hof-app .link-inherit.dimmed { opacity: 0.05; }
    #shs-hof-app .link-collab.dimmed, #shs-hof-app .link-influence.dimmed { opacity: 0.03; }

    /* ================= 右侧滑出详情面板 ================= */
    #shs-hof-app .detail-panel-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 9998;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }
    #shs-hof-app .detail-panel-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    #shs-hof-app .detail-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 440px;
      max-width: 95vw;
      height: 100vh;
      background: var(--hof-bg-card);
      box-shadow: -8px 0 30px rgba(0, 0, 0, 0.1);
      z-index: 9999;
      transform: translateX(100%);
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-y: auto;
      border-left: 1px solid var(--hof-border);
    }
    #shs-hof-app .detail-panel.active {
      transform: translateX(0);
    }

    #shs-hof-app .detail-close-btn {
      position: sticky;
      top: 0;
      right: 0;
      width: 100%;
      padding: 20px;
      display: flex;
      justify-content: flex-end;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--hof-border);
      border: none;
      cursor: pointer;
      z-index: 1;
    }
    #shs-hof-app .detail-close-btn svg {
      color: var(--hof-text-muted);
      width: 28px;
      height: 28px;
      padding: 8px;
      background: var(--hof-bg-secondary);
      border-radius: 50%;
      transition: all 0.25s;
    }
    #shs-hof-app .detail-close-btn:hover svg {
      background: var(--hof-accent-soft);
      color: var(--hof-accent2);
      transform: rotate(90deg);
    }

    #shs-hof-app .detail-panel-content {
      padding: 80px 28px 40px;
    }

    #shs-hof-app .detail-empty-state {
      text-align: center;
      padding: 100px 20px;
      color: var(--hof-text-muted);
    }
    #shs-hof-app .mascot-icon { font-size: 56px; margin-bottom: 20px; }

    /* 人物详情内容 - 领袖卡片风格 */
    #shs-hof-app .person-card {
      background: var(--hof-bg-card);
      border: 1px solid var(--hof-border);
      border-radius: var(--hof-radius);
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: var(--hof-shadow-xl);
      transition: box-shadow 0.3s, transform 0.2s;
    }
    #shs-hof-app .person-card:hover {
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    }
    
    #shs-hof-app .person-header-section {
      padding: 24px 28px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      border-bottom: 1px solid var(--hof-border);
      background: linear-gradient(135deg, rgba(196,163,90,0.03) 0%, transparent 100%);
    }
    
    #shs-hof-app .gen-tag {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 2px;
      padding: 6px 10px;
      border-radius: var(--hof-radius-sm);
      color: #fff;
      white-space: nowrap;
      text-align: center;
      line-height: 1.5;
      flex-shrink: 0;
      min-width: 70px;
    }
    
    #shs-hof-app .person-title-group {
      min-width: 0;
      flex: 1;
    }
    
    #shs-hof-app .person-title-group h2 {
      font-size: 24px;
      font-weight: 700;
      color: var(--hof-text-primary);
      line-height: 1.3;
      margin: 0 0 6px;
    }
    
    #shs-hof-app .person-role {
      font-size: 14px;
      color: var(--hof-accent);
      font-weight: 500;
      line-height: 1.5;
    }

    #shs-hof-app .person-body {
      padding: 28px 32px;
    }

    #shs-hof-app .person-tag-section {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 26px;
    }
    
    #shs-hof-app .person-tag {
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--hof-accent-soft);
      color: var(--hof-accent);
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    #shs-hof-app .person-tag.secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--hof-text-secondary);
    }

    #shs-hof-app .detail-section {
      margin-bottom: 26px;
    }
    #shs-hof-app .detail-section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--hof-accent);
      letter-spacing: 3px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    #shs-hof-app .person-contribution {
      font-size: 15px;
      color: var(--hof-text-secondary);

        { source: 'lilingjian', target: 'luoanqi', type: 'influence' },
        { source: 'wangyanran', target: 'zhangziwei', type: 'influence' },
      ];

      // D3 图表初始化
      const svgEl = document.getElementById('graph-svg');
      if (!svgEl) return;
      const containerRect = document.querySelector('.graph-container').getBoundingClientRect();
      const width = containerRect.width;
      const height = window.innerWidth < 640 ? 450 : (window.innerWidth < 1024 ? 550 : 650);
      svgEl.setAttribute('viewBox', `0 0 ${width} ${height}`);

      const g = d3.select(svgEl).append('g');
      const zoom = d3.zoom().scaleExtent([0.4, 2.5]).on('zoom', (event) => g.attr('transform', event.transform));
      d3.select(svgEl).call(zoom);

      // 布局分组
      const termGroups = {};
      people.forEach(p => { if (!termGroups[p.term]) termGroups[p.term] = []; termGroups[p.term].push(p); });

      const nodeMap = {};
      people.forEach(p => {
        const angle = (p.term - 1) * (2 * Math.PI / 8) - Math.PI / 2;
        const group = termGroups[p.term];
        const idx = group.indexOf(p);
        const offset = (idx - (group.length - 1) / 2) * 36;
        const rx = width * 0.35;
        const ry = height * 0.35;
        nodeMap[p.id] = {
          ...p,
          x: width / 2 + Math.cos(angle) * rx + Math.cos(angle + Math.PI/2) * offset,
          y: height / 2 + Math.sin(angle) * ry + Math.sin(angle + Math.PI/2) * offset,
          radius: p.role.includes('社长') || p.role.includes('主席') ? 16 : 11
        };
      });

      const nodes = Object.values(nodeMap);
      const simLinks = links.map(l => ({ ...l }));

      const linkElements = g.selectAll('.link').data(simLinks).enter().append('line').attr('class', d => `link-${d.type}`);
      const nodeGroups = g.selectAll('.node-group').data(nodes).enter().append('g').attr('class', 'node-group')
        .call(d3.drag().on('start', dragStart).on('drag', dragging).on('end', dragEnd));

      nodeGroups.append('circle').attr('r', d => d.radius + 1).attr('fill', 'none').attr('stroke', 'rgba(0,0,0,0.06)').attr('stroke-width', 1);
      nodeGroups.append('circle').attr('class', 'node-circle').attr('r', d => d.radius).attr('fill', d => termColors[d.term]).attr('fill-opacity', 0.9).attr('stroke', '#fff').attr('stroke-width', 2);
      nodeGroups.append('text').attr('class', 'node-label').attr('dy', d => d.radius + 15).text(d => d.name);
      nodeGroups.append('text').attr('class', 'node-role').attr('dy', d => d.radius + 26).text(d => { const m = d.role.match(/第[一二三四五六七八]+任|届/); return m ? d.role.substring(0, 4) : ''; });

      const termLabelData = Object.entries(termGroups).map(([term]) => {
        const angle = (parseInt(term) - 1) * (2 * Math.PI / 8) - Math.PI / 2;
        const dist = Math.min(width, height) * 0.42;
        return { x: width / 2 + Math.cos(angle) * dist, y: height / 2 + Math.sin(angle) * dist, label: `第${['一','二','三','四','五','六','七','八'][parseInt(term)-1]}届` };
      });
      g.selectAll('.term-group-label').data(termLabelData).enter().append('text').attr('class', 'term-group-label').attr('x', d => d.x).attr('y', d => d.y).text(d => d.label);

      function tick() {
        linkElements.attr('x1', d => nodeMap[d.source].x).attr('y1', d => nodeMap[d.source].y).attr('x2', d => nodeMap[d.target].x).attr('y2', d => nodeMap[d.target].y);
        nodeGroups.attr('transform', d => `translate(${d.x},${d.y})`);
      }

      // 性能优化: 冷却机制
      let alpha = 1;
      let animFrame;
      function simulate() {
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const dx = nodes[j].x - nodes[i].x, dy = nodes[j].y - nodes[i].y, dist = Math.sqrt(dx * dx + dy * dy) || 1, minDist = nodes[i].radius + nodes[j].radius + 44;
            if (dist < minDist) { const force = (minDist - dist) * 0.015 * alpha, fx = (dx / dist) * force, fy = (dy / dist) * force; nodes[i].x -= fx; nodes[i].y -= fy; nodes[j].x += fx; nodes[j].y += fy; }
          }
        }
        simLinks.forEach(link => {
          const s = nodeMap[link.source], t = nodeMap[link.target], dx = t.x - s.x, dy = t.y - s.y, dist = Math.sqrt(dx * dx + dy * dy) || 1;
          const ideal = link.type === 'inherit' ? 140 : 90;
          const force = (dist - ideal) * 0.002 * alpha;
          s.x += (dx / dist) * force; s.y += (dy / dist) * force; t.x -= (dx / dist) * force; t.y -= (dy / dist) * force;
        });
        nodes.forEach(n => {
          n.x += (width / 2 - n.x) * 0.0008 * alpha; n.y += (height / 2 - n.y) * 0.0008 * alpha;
          n.x = Math.max(n.radius + 10, Math.min(width - n.radius - 10, n.x)); n.y = Math.max(n.radius + 10, Math.min(height - n.radius - 10, n.y));
        });
        alpha *= 0.99; tick();
        if (alpha > 0.02) animFrame = requestAnimationFrame(simulate);
      }
      simulate();

      function dragStart(event, d) { alpha = Math.max(alpha, 0.3); d3.select(this).raise(); if(!animFrame) simulate(); }
      function dragging(event, d) { d.x = event.x; d.y = event.y; tick(); }
      function dragEnd() {}

      let radarChart = null;
      nodeGroups.on('click', (event, d) => {
        event.stopPropagation();
        nodeGroups.classed('selected', false);
        d3.select(event.currentTarget).classed('selected', true);
        openDetail(d);
      });
      d3.select(svgEl).on('click', () => { nodeGroups.classed('selected', false); closeDetail(); });

      // 打开详情面板
      function openDetail(p) {
        const overlay = document.getElementById('detailOverlay');
        const panel = document.getElementById('detailPanel');
        const content = document.getElementById('detailPanelContent');

        // 届数标签颜色
        const termColorsMap = { 1: '#e0556a', 2: '#e0884a', 3: '#d4a853', 4: '#5ac48e', 5: '#5a8ec4', 6: '#9a6ac4', 7: '#d47ac4', 8: '#4ac4b8' };
        
        // 渲染名言
        const quoteHtml = p.quote 
          ? `<div class="person-quote">${p.quote}<div class="quote-src">—— ${p.name}</div></div>`
          : '';

        // 渲染档案链接
        let archiveHtml = p.archive 
          ? `<div class="detail-section"><div class="detail-section-label">数字档案馆关联</div><div class="archive-links"><a href="#" class="archive-link">📄 ${p.archive}</a></div></div>`
          : '';

        // 渲染六维光谱雷达图
        let spectrumHtml = '';
        if (p.scores && p.scores.length >= 6) {
          spectrumHtml = `
            <div class="detail-section">
              <div class="detail-section-label">能力画像</div>
              <div id="radar-chart"></div>
            </div>
          `;
        }

        const startYear = 2017 + p.term;
        const endYear = startYear + 1;
        
        content.innerHTML = `
          <div class="person-card">
            <div class="person-header-section">
              <div class="gen-tag" style="background:${termColorsMap[p.term]}">第${['一','二','三','四','五','六','七','八'][p.term-1]}届<br>${startYear}–${endYear}</div>
              <div class="person-title-group">
                <h2>${p.name}</h2>
                <div class="person-role">${p.role}</div>
              </div>
            </div>
            <div class="person-body">
              <div class="person-tag-section">
                ${p.tags.map(t => `<span class="person-tag secondary">${t}</span>`).join('')}
              </div>
              <div class="detail-section">
                <div class="detail-section-label">主要贡献</div>
                <div class="person-contribution">${p.contribution}</div>
              </div>
              ${quoteHtml}
              ${spectrumHtml}
              ${archiveHtml}
            </div>
          </div>
        `;

        // 显示面板
        overlay.classList.add('active');
        panel.classList.add('active');
        document.body.style.overflow = 'hidden';
        
        // 渲染雷达图
        setTimeout(() => {
          renderRadar(p);
        }, 300);
      }

      // 关闭详情面板
      window.closeDetail = function() {
        const overlay = document.getElementById('detailOverlay');
        const panel = document.getElementById('detailPanel');
        const content = document.getElementById('detailPanelContent');

        overlay.classList.remove('active');
        panel.classList.remove('active');
        document.body.style.overflow = '';

        // 恢复空状态
        setTimeout(() => {
          content.innerHTML = `
            <div class="detail-empty-state">
              <div class="mascot-icon">🍓</div>
              <div>我是树莓酱！<br>点击图中的圆点，让我为您介绍历届领袖吧～</div>
            </div>
          `;
          if (radarChart) { radarChart.dispose(); radarChart = null; }
        }, 400);
      };

      function renderRadar(p) {
        if (radarChart) radarChart.dispose();
        const radarEl = document.getElementById('radar-chart');
        if (!radarEl) return;
        radarChart = echarts.init(radarEl);
        const color = termColors[p.term];
        const normalizedScores = p.scores.slice(0, 6).map(v => v / 20);
        radarChart.setOption({
          tooltip: { 
            trigger: 'item',
            backgroundColor: 'rgba(255, 255, 255, 0.95)',
            borderColor: '#e0e0ea',
            borderWidth: 1,
            textStyle: { color: '#3a3a4a' }
          },
          radar: {
            indicator: [ 
              { name: '制度规范化', max: 5 }, 
              { name: '艺术创作导向', max: 5 }, 
              { name: '对外拓展', max: 5 }, 
              { name: '技术革新驱动', max: 5 }, 
              { name: '人文温度传承', max: 5 },
              { name: '组织管理能力', max: 5 }
            ],
            shape: 'polygon', 
            radius: '65%',
            center: ['50%', '50%'],
            splitNumber: 5,
            axisName: { 
              color: '#88889a', 
              fontSize: 10, 
              fontFamily: '-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Noto Sans SC',
              fontWeight: 500
            },
            splitArea: {
              areaStyle: {
                color: ['rgba(196,163,90,0.05)', 'rgba(196,163,90,0.1)', 'rgba(196,163,90,0.05)', 'rgba(196,163,90,0.1)', 'rgba(196,163,90,0.05)']
              }
            },
            axisLine: { lineStyle: { color: 'rgba(0,0,0,0.1)' } },
            splitLine: { lineStyle: { color: 'rgba(0,0,0,0.08)' } }
          },
          series: [{ 
            type: 'radar', 
            data: [{ 
              value: normalizedScores, 
              name: p.name, 
              areaStyle: { color: color + '25' }, 
              lineStyle: { color: color, width: 2.5 }, 
              itemStyle: { color: color },
              symbol: 'circle',
              symbolSize: 6
            }] 
          }]
        });
      }

      window.filterTerm = function(term) {
        document.querySelectorAll('.timeline-item').forEach(n => n.classList.remove('active'));
        document.querySelector('.timeline-all').classList.remove('active');
        if (term === 0) { document.querySelector('.timeline-all').classList.add('active'); } 
        else { const el = document.querySelector(`.timeline-item[data-term="${term}"]`); if (el) el.classList.add('active'); }
        nodeGroups.classed('dimmed', d => term !== 0 && d.term !== term);
        linkElements.classed('dimmed', d => { if (term === 0) return false; const s = nodeMap[d.source], t = nodeMap[d.target]; return s.term !== term && t.term !== term; });
        g.selectAll('.term-group-label').attr('opacity', d => term === 0 ? 0.7 : 0.05);
      };

      window.addEventListener('resize', () => { if (radarChart) radarChart.resize(); });

      // ESC键关闭面板
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          closeDetail();
          nodeGroups.classed('selected', false);
        }
      });
    });
  </script>
</div>
